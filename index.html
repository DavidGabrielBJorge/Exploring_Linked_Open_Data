<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>LOD Explorer - A-Frame Prototype</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.5.0/dist/aframe-environment-component.min.js"></script>

  <link rel="stylesheet" href="style.css">
  <script src="main.js"></script>
</head>

<body>
  <div id="info-panel">
    <h2 id="info-title">LOD Explorer</h2>
    <p><strong>Type:</strong> <span id="info-type">Click on a node</span></p>
    <p><strong>URI:</strong> <span id="info-uri">-</span></p>
    <p><strong>Relations:</strong></p>
    <ul id="info-relations">
      <li>Select a node to see its relations.</li>
    </ul>
  </div>

  <a-scene lod-graph background="color: #ECECEC">
    
      <a-entity 
environment="preset: starry; groundColor: #445; grid: cross">
  </a-entity>
    <a-entity light="type: ambient; intensity: 0.8"></a-entity>
    <a-entity light="type: directional; intensity: 0.6" position="1 4 2"></a-entity>

    <a-plane
      position="0 0 -4"
      rotation="-90 0 0"
      width="8"
      height="8"
      visible="false"
      color="#DDDDDD">
    </a-plane>

    <a-entity id="camera" position="0 -0.291 -0.979">
      <a-camera wasd-controls-enabled="false">
        <a-cursor raycaster="objects: .clickable"></a-cursor>
      </a-camera>
    </a-entity>
  </a-scene>
</body>
</html>
